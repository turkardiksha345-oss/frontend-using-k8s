apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: frontend-stateful
spec:
  serviceName: "frontend-service"
  replicas: 2
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
        - name: frontend
          image: frontend-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80   # ✅ fixed
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
  volumeClaimTemplates:
    - metadata:
        name: frontend-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  clusterIP: None   # ✅ required for StatefulSet
  selector:
    app: frontend-app   # ✅ fixed label
  ports:
    - port: 80
      targetPort: 80    # ✅ fixed port