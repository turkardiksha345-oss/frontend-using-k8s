name: Full DevOps Pipeline (KIND + K8s + KEDA)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Checkout Code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 🔹 2. Install Docker (FIXED ✅)
    - name: Install Docker
      run: |
        sudo apt-get update
        sudo apt-mark unhold containerd || true
        sudo apt-get remove -y containerd containerd.io docker docker-engine docker.io runc || true
        sudo apt-get autoremove -y
        sudo apt-get clean
        sudo apt-get install -y docker.io

    # 🔹 3. Verify Docker
    - name: Verify Docker
      run: docker --version

    # 🔹 4. Install kubectl
    - name: Install kubectl
      run: |
        curl -LO https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    # 🔹 5. Install KIND
    - name: Install KIND
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
        chmod +x kind
        sudo mv kind /usr/local/bin/

    # 🔹 6. Create KIND Cluster
    - name: Create KIND Cluster
      run: |
        cat <<EOF > kind-config.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraPortMappings:
          - containerPort: 30007
            hostPort: 30007
        EOF
        kind create cluster --name ci-cluster --config kind-config.yml

    # 🔹 7. Install Ingress Controller (FIXED ✅)
    - name: Install Ingress Controller
      run: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml

        echo "Waiting for ingress controller rollout..."

        kubectl rollout status deployment ingress-nginx-controller -n ingress-nginx --timeout=300s

        kubectl get pods -n ingress-nginx

    # 🔹 8. Build Docker Image
    - name: Build Docker Image
      run: docker build -t frontend-app:latest .

    # 🔹 9. Load Image into KIND
    - name: Load Image into KIND
      run: kind load docker-image frontend-app:latest --name ci-cluster

    # 🔹 10. Install KEDA
    - name: Install KEDA
      run: |
        kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.14.0/keda-2.14.0.yaml

    # 🔹 11. Wait for KEDA
    - name: Wait for KEDA
      run: |
        kubectl rollout status deployment keda-operator -n keda --timeout=300s

    # 🔹 12. Deploy Application
    - name: Deploy K8s Resources
      run: |
        kubectl apply -f k8s/deployment.yml
        kubectl apply -f k8s/service.yml
        kubectl apply -f k8s/frontend-nodeport.yml
        kubectl apply -f k8s/ingress.yml

    # 🔹 13. Apply Autoscaling
    - name: Apply KEDA Autoscaling
      run: kubectl apply -f k8s/autoscaling-keda.yml

    # 🔹 14. Wait for Pods Ready
    - name: Wait for Pods
      run: |
        kubectl wait --for=condition=ready pod --all --timeout=300s

    # 🔹 15. Debug (VERY IMPORTANT 🔍)
    - name: Check Pods
      run: kubectl get pods -o wide

    - name: Check Services
      run: kubectl get svc

    - name: Check Ingress
      run: kubectl get ingress