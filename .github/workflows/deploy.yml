name: Full DevOps Pipeline (KIND + K8s + KEDA + Monitoring)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Checkout Code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 🔹 2. Install Docker (FIXED)
    - name: Install Docker
      run: |
        sudo apt-get update
        sudo apt-mark unhold containerd || true
        sudo apt-get remove -y containerd containerd.io docker docker-engine docker.io runc || true
        sudo apt-get autoremove -y
        sudo apt-get clean
        sudo apt-get install -y docker.io

    # 🔹 3. Verify Docker
    - name: Verify Docker
      run: docker --version

    # 🔹 4. Install kubectl
    - name: Install kubectl
      run: |
        curl -LO https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/

    # 🔹 5. Install KIND
    - name: Install KIND
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
        chmod +x kind
        sudo mv kind /usr/local/bin/

    # 🔹 6. Create KIND Cluster
    - name: Create KIND Cluster
      run: |
        cat <<EOF > kind-config.yml
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraPortMappings:
          - containerPort: 30007
            hostPort: 30007
        EOF
        kind create cluster --name ci-cluster --config kind-config.yml

    # 🔹 7. Install Ingress Controller (FIXED)
    - name: Install Ingress
      run: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
        kubectl rollout status deployment ingress-nginx-controller -n ingress-nginx --timeout=300s

    # 🔹 8. Install Helm
    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    # 🔹 9. Install KEDA (Helm FIX)
    - name: Install KEDA
      run: |
        helm repo add kedacore https://kedacore.github.io/charts
        helm repo update
        helm install keda kedacore/keda --namespace keda --create-namespace

    # 🔹 10. Wait for KEDA
    - name: Wait for KEDA
      run: |
        kubectl rollout status deployment keda-operator -n keda --timeout=300s

    # 🔹 11. Install Monitoring (Prometheus + Grafana)
    - name: Install Monitoring
      run: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm install monitoring prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --create-namespace

    # 🔹 12. Wait for Monitoring
    - name: Wait for Monitoring
      run: |
        kubectl rollout status deployment monitoring-kube-prometheus-operator -n monitoring --timeout=300s

    # 🔹 13. Build Docker Image
    - name: Build Docker Image
      run: docker build -t frontend-app:latest .

    # 🔹 14. Load Image into KIND
    - name: Load Image into KIND
      run: kind load docker-image frontend-app:latest --name ci-cluster

    # 🔹 15. Deploy Application
    - name: Deploy K8s Resources
      run: |
        kubectl apply -f k8s/deployment.yml
        kubectl apply -f k8s/service.yml
        kubectl apply -f k8s/frontend-nodeport.yml
        kubectl apply -f k8s/ingress.yml

    # 🔹 16. Apply Autoscaling
    - name: Apply KEDA Autoscaling
      run: kubectl apply -f k8s/autoscaling-keda.yml

    # 🔹 17. Wait for Pods Ready
    - name: Wait for Pods
      run: |
        kubectl wait --for=condition=ready pod --all --timeout=300s

    # 🔹 18. Debug Info (IMPORTANT)
    - name: Check Pods
      run: kubectl get pods -o wide

    - name: Check Services
      run: kubectl get svc

    - name: Check Ingress
      run: kubectl get ingress

    - name: Check Monitoring
      run: kubectl get pods -n monitoring